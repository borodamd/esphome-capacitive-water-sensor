# Пример использования сенсора
esphome:
  name: water-sensor-example

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

external_components:
  - source: github://YOUR_USERNAME/esphome-capacitive-water-sensor
    components: [capacitive_water_sensor]

wifi:
  ssid: "YOUR_SSID"
  password: "YOUR_PASSWORD"

logger:
  level: DEBUG

api:
  encryption:
    key: "YOUR_ENCRYPTION_KEY"

ota:
  password: "YOUR_OTA_PASSWORD"

sensor:
  - platform: capacitive_water_sensor
    name: "Water Level"
    send_pin: 5
    receive_pin: 4
    num_samples: 1000
    min_raw_value: 4200
    max_raw_value: 11000
    update_interval: 100ms
